name: CI process Golang
on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Pull from Git
        uses: actions/checkout@v4
      - name: Set up Golang
        uses: actions/setup-go@v4
        with:
          go-version: '1.26.1'
      - name: Build
        run: |
          go mod download
          go build -v ./cmd/shorter
      - name: Tests
        run: go test -v ./internal/...